ine">56</span><br><span class="line">57</span><br><span class="line">58</span><br><span class="line">59</span><br><span class="line">60</span><br><span class="line">61</span><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br><span class="line">66</span><br><span class="line">67</span><br><span class="line">68</span><br><span class="line">69</span><br><span class="line">70</span><br><span class="line">71</span><br><span class="line">72</span><br><span class="line">73</span><br><span class="line">74</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">import</span> mxnet <span class="keyword">as</span> mx</span><br><span class="line"><span class="keyword">import</span> os</span><br><span class="line"><span class="keyword">import</span> subprocess</span><br><span class="line"><span class="keyword">import</span> numpy <span class="keyword">as</span> np</span><br><span class="line"><span class="keyword">import</span> re</span><br><span class="line"><span class="keyword">import</span> matplotlib</span><br><span class="line">matplotlib.use(<span class="string">'Agg'</span>)</span><br><span class="line"><span class="keyword">import</span> matplotlib.pyplot <span class="keyword">as</span> plt</span><br><span class="line"><span class="keyword">import</span> cv2</span><br><span class="line"><span class="keyword">import</span> random</span><br><span class="line"><span class="keyword">import</span> time</span><br><span class="line"><span class="keyword">import</span> shutil</span><br><span class="line"><span class="keyword">import</span> pickle</span><br><span class="line"><span class="keyword">import</span> argparse</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">def</span> <span class="title">separate_train_valid</span><span class="params">(dir_path, valid_dir_path, train_proportion=<span class="number">0.95</span>)</span>:</span></span><br><span class="line">    <span class="string">"""</span></span><br><span class="line"><span class="string">    Assumes directory structure: dir_path has folders named TRAIN_#, each TRAIN_# contains folders</span></span><br><span class="line"><span class="string">    of image sequences.</span></span><br><span class="line"><span class="string">    This function randomly selects train_proportion of them to remain in original set, while move the</span></span><br><span class="line"><span class="string">    others to VALID_# under valid_dir_path</span></span><br><span class="line"><span class="string">    """</span></span><br><span class="line">    <span class="keyword">if</span> <span class="keyword">not</span> os.path.exists(valid_dir_path):</span><br><span class="line">        os.mkdir(valid_dir_path)</span><br><span class="line">    train_folders = os.listdir(dir_path)</span><br><span class="line">    valid_folders = [folder_name.replace(<span class="string">'TRAIN'</span>, <span class="string">'VALID'</span>) <span class="keyword">for</span> folder_name <span class="keyword">in</span> train_folders]</span><br><span class="line">    train_folders = [os.path.join(dir_path, folder_name) <span class="keyword">for</span> folder_name <span class="keyword">in</span> train_folders]</span><br><span class="line">    valid_folders = [os.path.join(valid_dir_path, folder_name) <span class="keyword">for</span> folder_name <span class="keyword">in</span> valid_folders]</span><br><span class="line">    <span class="keyword">for</span> train_folder, valid_folder <span class="keyword">in</span> zip(train_folders, valid_folders):</span><br><span class="line">        <span class="keyword">if</span> <span class="keyword">not</span> os.path.exists(valid_folder):</span><br><span class="line">            os.mkdir(valid_folder)</span><br><span class="line">        seq_names = os.listdir(train_folder)</span><br><span class="line">        <span class="keyword">for</span> seq_name <span class="keyword">in</span> seq_names:</span><br><span class="line">            <span class="keyword">if</span> random.random() &gt; train_proportion:</span><br><span class="line">                shutil.move(os.path.join(train_folder, seq_name), os.path.join(valid_folder, seq_name))</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">def</span> <span class="title">generate_rec</span><span class="params">(data_path, prefix_path, do_shuffle, num_parts, seq_len)</span>:</span></span><br><span class="line">    <span class="comment">#seqlen=31 or 61</span></span><br><span class="line">    <span class="comment"># transform into .lst file</span></span><br><span class="line">    im2rec_path = mx.test_utils.get_im2rec_path()</span><br><span class="line">    <span class="keyword">with</span> open(os.devnull, <span class="string">'wb'</span>) <span class="keyword">as</span> devnull:</span><br><span class="line">        subprocess.check_call([<span class="string">'python'</span>, im2rec_path, <span class="string">'--list'</span>, <span class="string">'--recursive'</span>, <span class="string">'--test-ratio=0.2'</span>, prefix_path, data_path],</span><br><span class="line">                            stdout=devnull)</span><br><span class="line"></span><br><span class="line">    <span class="comment"># sort the lst file</span></span><br><span class="line">    <span class="keyword">if</span> num_parts == <span class="number">1</span>:</span><br><span class="line">        <span class="keyword">with</span> open(prefix_path+<span class="string">'.lst'</span>, <span class="string">'r+'</span>) <span class="keyword">as</span> f:</span><br><span class="line">            f.seek(<span class="number">0</span>)</span><br><span class="line">            lines = f.readlines()</span><br><span class="line">            lines.sort(key=<span class="keyword">lambda</span> line:re.split(<span class="string">r'\s+'</span>, line)[<span class="number">-2</span>])</span><br><span class="line">            f.seek(<span class="number">0</span>)</span><br><span class="line">            f.writelines(lines)</span><br><span class="line">        <span class="comment"># generate record file</span></span><br><span class="line">        <span class="keyword">with</span> open(os.devnull, <span class="string">'wb'</span>) <span class="keyword">as</span> devnull:</span><br><span class="line">            subprocess.check_call([<span class="string">'python'</span>, im2rec_path, <span class="string">'--num-thread=4'</span>, <span class="string">'--pass-through'</span>, <span class="string">'--test-ratio=0.2'</span>, prefix_path, data_path],</span><br><span class="line">                            stdout=devnull)</span><br><span class="line"><span class="keyword">if</span> __name__ == <span class="string">'__main__'</span>:</span><br><span class="line">    parser = argparse.ArgumentParser()</span><br><span class="line">    parser.add_argument(<span class="string">'--mission_type'</span>, dest=<span class="string">'mission_type'</span>, help=<span class="string">'train or predict'</span>, default=<span class="string">'train'</span>)</span><br><span class="line"></span><br><span class="line">    parser.add_argument(<span class="string">'--data_path'</span>, dest=<span class="string">'data_path'</span>, help=<span class="string">'the path for data'</span>)</span><br><span class="line">    parser.add_argument(<span class="string">'--rec_prefix'</span>, dest=<span class="string">'rec_prefix'</span>)</span><br><span class="line">    parser.add_argument(<span class="string">'--rec_prefix_valid'</span>, dest=<span class="string">'rec_prefix_valid'</span>, default=<span class="string">'//'</span>)</span><br><span class="line">    args = parser.parse_args()</span><br><span class="line"></span><br><span class="line">    <span class="keyword">if</span> args.mission_type == <span class="string">'train'</span>:</span><br><span class="line">        <span class="comment">#assert args.rec_prefix_valid != '//'</span></span><br><span class="line">        <span class="comment">#separate_train_valid(args.data_path, args.data_path+'_valid')</span></span><br><span class="line">        generate_rec(args.data_path, args.rec_prefix, do_shuffle=<span class="literal">False</span>, num_parts=<span class="number">1</span>, seq_len=<span class="number">30</span>)</span><br><span class="line">        <span class="comment">#generate_rec(args.data_path+'_valid', args.rec_prefix_valid, do_shuffle=True, num_parts=1, seq_len=30)</span></span><br><span class="line">    <span class="keyword">elif</span> args.mission_type == <span class="string">'predict'</span>:</span><br><span class="line">        generate_rec(args.data_path, args.rec_prefix, do_shuffle=<span class="literal">False</span>, num_parts=<span class="number">1</span>, seq_len=<span class="number">15</span>)</span><br><span class="line">    <span class="keyword">else</span>:</span><br><span class="line">        <span class="keyword">raise</span>(IOError)</span><br></pre></td></tr></table></figure>
